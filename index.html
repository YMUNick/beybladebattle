<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#050505">
<!-- PWA / 加入主畫面(iOS 亦可全螢幕) -->
<link rel="manifest" href="manifest.json">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="陀螺對戰">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" type="image/png" href="icon-192.png">
<title>BEYBLADE X 對戰計分板</title>
<style>
:root{
  --bg:#050705;
  --panel:#04170c;
  --neon:#35e83a;
  --neon-dim:#1d8f28;
  --neon-glow:0 0 6px rgba(53,232,58,.9),0 0 18px rgba(53,232,58,.45);
  --white:#f2fff2;
  --danger:#ff4d5e;
  --amber:#ffb830;
  --font-tech:"Segoe UI","PingFang TC","Microsoft JhengHei",system-ui,sans-serif;
  --font-num:"Consolas","Menlo",monospace;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{
  background:
    repeating-linear-gradient(0deg,rgba(53,232,58,.025) 0 1px,transparent 1px 4px),
    radial-gradient(ellipse at 50% 20%,#0a1f10 0%,var(--bg) 70%);
  color:var(--white);
  font-family:var(--font-tech);
  min-height:100dvh;
  overflow-x:hidden;
}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select{font-family:inherit}
.screen{display:none;min-height:100dvh;flex-direction:column}
.screen.active{display:flex}
.neon-text{color:var(--neon);text-shadow:var(--neon-glow)}

/* ====== 頂部標題 ====== */
.brand{
  text-align:center;padding:14px 8px 6px;
  font-weight:900;letter-spacing:.18em;font-size:clamp(27px,6.75vw,39px);
  font-style:italic;
}
.brand .x{color:var(--neon);text-shadow:var(--neon-glow);font-size:1.875em}
.brand small{display:block;font-style:normal;font-weight:400;letter-spacing:.5em;font-size:0.63em;color:var(--neon-dim);margin-top:2px}

/* ====== 設定畫面 ====== */
#setup{padding:0 14px 30px;max-width:980px;margin:0 auto;width:100%}
.setup-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:10px}
@media(max-width:720px){.setup-grid{grid-template-columns:1fr}}
.pcard{
  border:1px solid var(--neon-dim);
  background:linear-gradient(180deg,rgba(53,232,58,.06),rgba(0,0,0,.25));
  clip-path:polygon(14px 0,100% 0,100% calc(100% - 14px),calc(100% - 14px) 100%,0 100%,0 14px);
  padding:16px 14px 18px;
}
.pcard h3{
  font-size:19.5px;letter-spacing:.35em;color:var(--neon);
  border-bottom:1px solid var(--neon-dim);padding-bottom:8px;margin-bottom:12px;
  text-shadow:var(--neon-glow);
}
.field{margin-bottom:12px}
.field label{display:block;font-size:16.5px;letter-spacing:.2em;color:#9adf9f;margin-bottom:5px}
.field input,.field select{
  width:100%;padding:10px 12px;font-size:22.5px;
  background:#020a05;border:1px solid var(--neon-dim);color:var(--white);
  outline:none;border-radius:2px;
}
.field input:focus,.field select:focus{border-color:var(--neon);box-shadow:0 0 8px rgba(53,232,58,.4)}
.deck-slot{display:grid;grid-template-columns:1fr 92px;gap:6px;margin-bottom:8px}
.deck-slot select,.deck-slot input{min-width:0;padding:9px 10px;font-size:21px;background:#020a05;border:1px solid var(--neon-dim);color:var(--white);outline:none;border-radius:2px}
.hint{font-size:16.5px;color:#6fae76;margin-top:4px;line-height:1.6}
.bigbtn{
  display:block;width:min(420px,90%);margin:26px auto 0;
  padding:15px 0;text-align:center;
  font-size:clamp(24px,6vw,30px);font-weight:900;letter-spacing:.4em;text-indent:.4em;
  color:#031006;background:var(--neon);
  clip-path:polygon(18px 0,100% 0,calc(100% - 18px) 100%,0 100%);
  box-shadow:0 0 14px rgba(53,232,58,.55),inset 0 0 0 2px #baffbe;
  transition:transform .08s;
}
.bigbtn:active{transform:scale(.97)}
.subbtns{display:flex;gap:10px;justify-content:center;margin-top:14px;flex-wrap:wrap}
.ghostbtn{
  padding:9px 18px;font-size:18px;letter-spacing:.15em;
  border:1px solid var(--neon-dim);color:#9adf9f;
  clip-path:polygon(10px 0,100% 0,calc(100% - 10px) 100%,0 100%);
}
.ghostbtn:hover{border-color:var(--neon);color:var(--neon)}
#loadStatus{text-align:center;font-size:18px;color:#6fae76;margin:8px 0 2px;letter-spacing:.1em}
#loadStatus.err{color:var(--danger)}
.format-row{display:flex;gap:10px;justify-content:center;margin-top:16px}
.fmt{
  padding:10px 22px;border:1px solid var(--neon-dim);letter-spacing:.15em;font-size:19.5px;color:#9adf9f;
  clip-path:polygon(12px 0,100% 0,calc(100% - 12px) 100%,0 100%);
}
.fmt.sel{background:var(--neon);color:#031006;font-weight:900;box-shadow:0 0 12px rgba(53,232,58,.5)}

/* ============================================================
   對戰畫面(仿官方平板計分面板)
============================================================ */
#battle{position:relative;background:#030503}
.hud{
  position:relative;display:flex;flex-direction:column;min-height:100dvh;
  padding:clamp(10px,2.5vmin,22px);
}
/* 四角綠色括號 */
.corner{position:fixed;width:clamp(26px,6vmin,52px);height:clamp(26px,6vmin,52px);z-index:5;pointer-events:none}
.corner::before{content:"";position:absolute;inset:0;border:3px solid var(--neon);filter:drop-shadow(0 0 5px rgba(53,232,58,.8))}
.corner.tl{top:8px;left:8px}.corner.tl::before{border-right:0;border-bottom:0}
.corner.tr{top:8px;right:8px}.corner.tr::before{border-left:0;border-bottom:0}
.corner.bl{bottom:8px;left:8px}.corner.bl::before{border-right:0;border-top:0}
.corner.br{bottom:8px;right:8px}.corner.br::before{border-left:0;border-top:0}
#battle .corner{display:none}
#battle.active .corner{display:block}

/* 上排 */
.toprow{display:grid;grid-template-columns:1fr auto 1fr;align-items:start;gap:8px}
.nameplate{
  background:var(--white);color:#0a0a0a;font-weight:900;
  font-size:clamp(22.5px,6.3vw,39px);letter-spacing:.06em;
  padding:8px 12px;
  overflow:hidden;white-space:nowrap;text-overflow:ellipsis;
  box-shadow:0 0 10px rgba(53,232,58,.25);
}
.nameplate.p1{clip-path:polygon(0 0,100% 0,calc(100% - 16px) 100%,0 100%);text-align:left}
.nameplate.p2{clip-path:polygon(16px 0,100% 0,100% 100%,0 100%);text-align:right}
.roundbox{text-align:center;min-width:86px}
.roundbox .r{font-size:clamp(39px,10.5vw,63px);font-weight:900;font-style:italic}
.roundbox .r b{color:var(--neon);text-shadow:var(--neon-glow)}
.roundbox .timer{font-family:var(--font-num);font-size:clamp(18px,4.5vw,24px);color:#bfe8c2;letter-spacing:.15em}
.roundbox .target-note{font-size:15px;color:#6fae76;letter-spacing:.15em;margin-top:2px}

/* 主格線:左按鈕 | 中央 | 右按鈕 */
.mainrow{
  flex:1;display:grid;grid-template-columns:minmax(0,1fr) auto minmax(0,1fr);
  align-items:center;gap:clamp(6px,1.6vw,18px);
  padding:clamp(6px,1.5vmin,14px) 0;
}
.fincol{display:flex;flex-direction:column;gap:clamp(6px,1.4vmin,12px);align-self:stretch;justify-content:center}
.fbtn{
  position:relative;display:flex;align-items:center;gap:8px;
  border:2px solid var(--neon);color:var(--neon);
  background:rgba(3,10,5,.85);
  padding:clamp(7px,1.6vmin,13px) clamp(8px,1.8vmin,16px);
  clip-path:polygon(0 0,calc(100% - 12px) 0,100% 12px,100% 100%,12px 100%,0 calc(100% - 12px));
  filter:drop-shadow(0 0 4px rgba(53,232,58,.45));
  transition:background .08s,transform .08s;
  min-height:44px;
}
.fbtn .fname{font-weight:900;font-size:clamp(19.5px,5.1vw,30px);letter-spacing:.04em;line-height:1}
.fbtn .fsub{font-size:clamp(12px,2.85vw,16.5px);color:#9adf9f;letter-spacing:.08em}
.fbtn .fpts{margin-left:auto;font-weight:900;font-size:clamp(21px,5.4vw,33px);font-style:italic}
.fincol.right .fbtn{flex-direction:row-reverse}
.fincol.right .fbtn .fpts{margin-left:0;margin-right:auto}
.fbtn.xtreme{border-width:3px;color:#7dff81;filter:drop-shadow(0 0 8px rgba(53,232,58,.8))}
.fbtn.xtreme .fname{font-size:clamp(22.5px,6vw,36px)}
.fbtn:active{background:var(--neon);color:#031006;transform:scale(.96)}
.fbtn:active .fsub,.fbtn:active .fpts{color:#031006}
.fbtn[disabled]{opacity:.28;pointer-events:none}

/* 中央:分數 + 控制 */
.centercol{display:flex;flex-direction:column;align-items:center;gap:clamp(6px,1.4vmin,12px)}
.scorepair{display:flex;align-items:center;gap:clamp(6px,2vw,16px)}
.scoreunit{display:flex;flex-direction:column;align-items:center;gap:4px}
.scorebox{
  width:clamp(74px,20vw,170px);aspect-ratio:1/1;
  border:3px solid var(--neon);border-radius:18px;
  display:flex;align-items:center;justify-content:center;
  position:relative;background:rgba(2,13,6,.55);
  box-shadow:var(--neon-glow),inset 0 0 22px rgba(53,232,58,.12);
  transition:transform .12s;
}
.scorebox.bump{transform:scale(1.12)}
.scorebox .digit{
  font-family:var(--font-num);font-weight:900;
  font-size:clamp(66px,19.5vw,165px);line-height:1;color:var(--neon);
  text-shadow:var(--neon-glow);position:relative;
}
.scorebox .digit.zero::after{
  content:"";position:absolute;left:6%;right:6%;top:50%;height:6%;
  background:var(--neon);transform:rotate(-45deg);border-radius:4px;
  box-shadow:var(--neon-glow);
}
.scorelabel{font-size:clamp(12px,3vw,16.5px);letter-spacing:.55em;text-indent:.55em;color:var(--neon);text-shadow:0 0 6px rgba(53,232,58,.6)}
/* READY 按鈕(每側 SPIN 上方,填滿空白區) */
.readybtn{
  flex:1;width:100%;min-height:56px;
  display:flex;align-items:center;justify-content:center;text-align:center;
  border:2px solid var(--neon);color:var(--neon);
  background:rgba(2,15,7,.88);
  clip-path:polygon(0 0,calc(100% - 12px) 0,100% 12px,100% 100%,12px 100%,0 calc(100% - 12px));
  filter:drop-shadow(0 0 4px rgba(53,232,58,.45));
  font-weight:900;font-size:clamp(16px,4vw,26px);letter-spacing:.28em;text-indent:.28em;
  line-height:1.5;
  animation:pulse 1.1s infinite;
  transition:background .1s,transform .08s;
}
.readybtn.ready{animation:none;background:rgba(53,232,58,.92);color:#031006;letter-spacing:.2em;text-indent:.2em;box-shadow:0 0 16px rgba(53,232,58,.6);filter:drop-shadow(0 0 10px rgba(53,232,58,.7))}
.readybtn:active{transform:scale(.96)}
.readybtn[hidden]{display:none}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.45}}
.midtris{display:flex;gap:6px;align-items:center}
.midtris span{width:0;height:0;border-top:clamp(9px,2.4vw,16px) solid transparent;border-bottom:clamp(9px,2.4vw,16px) solid transparent}
.midtris .l{border-left:clamp(12px,3vw,20px) solid var(--white);filter:drop-shadow(0 0 4px rgba(255,255,255,.6))}
.midtris .r{border-right:clamp(12px,3vw,20px) solid var(--white);filter:drop-shadow(0 0 4px rgba(255,255,255,.6))}

.midbtn{
  padding:7px 26px;font-size:clamp(16.5px,4.2vw,21px);letter-spacing:.3em;text-indent:.3em;
  color:#0a0a0a;background:#cfd6cf;font-weight:700;
  clip-path:polygon(10px 0,100% 0,calc(100% - 10px) 100%,0 100%);
}
.midbtn:active{background:var(--neon)}
.midbtn[disabled]{opacity:.35;pointer-events:none}
/* 發射失敗 */
.failrow{display:flex;gap:clamp(10px,4vw,28px);align-items:flex-start}
.failunit{text-align:center}
.failunit .flab{font-size:13.5px;color:#9adf9f;letter-spacing:.2em;margin-bottom:3px}
.faildots{display:flex;gap:5px;justify-content:center;padding:5px 9px;border:1px solid var(--neon-dim);cursor:pointer;
  clip-path:polygon(6px 0,100% 0,calc(100% - 6px) 100%,0 100%)}
.faildots i{width:10px;height:10px;border:1px solid var(--neon);border-radius:2px;display:block}
.faildots i.on{background:var(--danger);border-color:var(--danger);box-shadow:0 0 6px rgba(255,77,94,.8)}
.smallbtns{display:flex;gap:8px}
.ctrl{
  padding:7px 16px;font-size:16.5px;letter-spacing:.25em;text-indent:.25em;
  border:1px solid var(--neon-dim);color:#cdeacd;background:rgba(4,23,12,.85);
  clip-path:polygon(8px 0,100% 0,calc(100% - 8px) 100%,0 100%);
}
.ctrl:active{background:var(--neon);color:#031006}

/* 底部陀螺 */
.botrow{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding-top:6px}
.beyslot{display:flex;flex-direction:column;align-items:flex-start;gap:5px;min-width:0}
.beyslot.right{align-items:flex-end}
.beycard{
  display:flex;align-items:center;gap:8px;max-width:100%;
  border:1px solid var(--neon-dim);background:rgba(2,13,6,.75);
  padding:5px 10px;
  clip-path:polygon(10px 0,100% 0,calc(100% - 10px) 100%,0 100%);
}
.beycard img,.beycard svg{width:clamp(92px,24vw,144px);height:clamp(92px,24vw,144px);object-fit:contain;border-radius:50%;background:#04170c;flex:0 0 auto;border:2px solid var(--neon-dim);box-shadow:0 0 10px rgba(53,232,58,.35)}
.beycard .bn{font-size:clamp(16.5px,4.05vw,21px);font-weight:700;color:var(--neon);text-shadow:0 0 6px rgba(53,232,58,.6);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.beycard .bt{font-size:13.5px;color:#9adf9f;letter-spacing:.1em}
.deckdots{display:flex;gap:5px;flex-wrap:wrap}
.beyslot.right .deckdots{justify-content:flex-end}
.deckdots button{
  display:flex;align-items:center;gap:5px;
  font-size:15px;padding:3px 8px 3px 4px;border:1px solid var(--neon-dim);color:#9adf9f;
  max-width:130px;white-space:nowrap;overflow:hidden;
}
.deckdots button span{overflow:hidden;text-overflow:ellipsis}
.deckdots .thumb{width:20px;height:20px;border-radius:50%;object-fit:contain;background:#04170c;flex:0 0 auto}
.deckdots .thumb.dot{display:block;box-shadow:0 0 5px currentColor}
.deckdots button.on{background:var(--neon);color:#031006;font-weight:700}

/* ====== 手機直向:對戰面板自適應縮放,完整塞入不被截斷 ====== */
@media (max-width:600px){
  /* 兩側決勝按鈕欄用固定寬度(隨螢幕縮放),中央彈性,避免內容撐破螢幕被 overflow-x 裁掉 */
  .mainrow{gap:5px;grid-template-columns:clamp(80px,26vw,116px) minmax(0,1fr) clamp(80px,26vw,116px)}
  .mainrow>*{min-width:0}
  .fincol{min-width:0;gap:6px}
  .fbtn{min-width:0;padding:7px 6px;gap:3px;min-height:40px}
  .fbtn>span:first-child{min-width:0;flex:1;overflow:hidden}
  .fbtn .fname{font-size:clamp(12px,3.6vw,16px);letter-spacing:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .fbtn .fsub{display:none}  /* 手機空間有限,隱藏中文副標,主標籤(SPIN/OVER…)完整顯示 */
  .fbtn .fpts{font-size:clamp(14px,4.2vw,19px)}
  .fbtn.xtreme{border-width:2px}
  .fbtn.xtreme .fname{font-size:clamp(12px,3.6vw,16px)}
  .readybtn{min-height:44px;font-size:clamp(12px,3.6vw,18px);letter-spacing:.12em;text-indent:.12em;border-width:2px}
  /* 中央分數縮小,把寬度讓給兩側決勝按鈕 */
  .scorepair{gap:4px}
  .scorebox{width:clamp(52px,15vw,84px);border-width:2px}
  .scorebox .digit{font-size:clamp(40px,12vw,80px)}
  .scorelabel{font-size:clamp(9px,2.6vw,12px)}
  /* 上排名牌/回合資訊縮小 */
  .nameplate{font-size:clamp(14px,4.4vw,22px);padding:6px 9px}
  .roundbox{min-width:64px}
  .roundbox .r{font-size:clamp(24px,7.5vw,38px)}
  .roundbox .timer{font-size:clamp(12px,3.4vw,16px)}
}

/* ====== 倒數(全白) ====== */
#countdown{
  position:fixed;inset:0;z-index:80;display:none;
  align-items:center;justify-content:center;background:#fff;color:#0a0a0a;
}
#countdown.show{display:flex}
/* 倒數數字 + 螢光綠小三角形 */
#cdWrap{display:flex;align-items:center;justify-content:center;gap:clamp(10px,3vw,26px)}
#cdWrap.p-up{flex-direction:column}
#cdWrap.p-down{flex-direction:column}
#cdWrap.p-left{flex-direction:row}
#cdWrap.p-right{flex-direction:row}
#cdWrap.p-up .cdTri,#cdWrap.p-left .cdTri{order:-1}
#cdWrap.p-down .cdTri,#cdWrap.p-right .cdTri{order:1}
.cdTri{
  width:clamp(16px,4.5vw,38px);height:clamp(16px,4.5vw,38px);
  background:#2bff32;
  filter:drop-shadow(0 0 5px rgba(43,255,50,.95)) drop-shadow(0 0 14px rgba(43,255,50,.6));
  animation:triPop .28s cubic-bezier(.2,1.8,.4,1);
}
#cdWrap.p-up    .cdTri{clip-path:polygon(50% 0,100% 100%,0 100%)}
#cdWrap.p-down  .cdTri{clip-path:polygon(0 0,100% 0,50% 100%)}
#cdWrap.p-left  .cdTri{clip-path:polygon(0 50%,100% 0,100% 100%)}
#cdWrap.p-right .cdTri{clip-path:polygon(0 0,100% 50%,0 100%)}
@keyframes triPop{from{transform:scale(0);opacity:0}to{transform:scale(1);opacity:1}}
#cdText{
  font-weight:900;font-style:italic;text-align:center;line-height:1;
  font-size:clamp(120px,42vw,380px);
  animation:cdpop .28s cubic-bezier(.2,1.8,.4,1);
}
#cdText.goshoot{font-size:clamp(46px,14vw,150px);letter-spacing:.02em}
@keyframes cdpop{from{transform:scale(2.4);opacity:0}to{transform:scale(1);opacity:1}}

/* ====== 勝利 ====== */
#victory{position:fixed;inset:0;z-index:50;display:none;align-items:center;justify-content:center;background:rgba(1,8,4,.9);backdrop-filter:blur(3px)}
#victory.show{display:flex}
.vbox{text-align:center;padding:30px 20px;animation:vin .4s cubic-bezier(.2,1.6,.4,1)}
@keyframes vin{from{transform:scale(.6);opacity:0}to{transform:scale(1);opacity:1}}
.vbox .vt{font-size:clamp(19.5px,4.5vw,25.5px);letter-spacing:.6em;color:var(--neon);text-shadow:var(--neon-glow)}
.vbox .vn{font-size:clamp(60px,16.5vw,126px);font-weight:900;font-style:italic;margin:8px 0 2px;text-shadow:0 0 24px rgba(53,232,58,.55)}
.vbox .vsics{font-size:clamp(30px,7.5vw,45px);font-family:var(--font-num);color:var(--neon);text-shadow:var(--neon-glow);margin-bottom:22px}
.vbox .subbtns{margin-top:6px}
.vbox .bigbtn{margin-top:0}

/* ====== 紀錄 ====== */
#log{padding:0 14px 40px;max-width:900px;margin:0 auto;width:100%}
.logitem{
  border:1px solid var(--neon-dim);margin-bottom:10px;padding:10px 12px;
  background:rgba(4,23,12,.6);font-size:19.5px;line-height:1.7;
  clip-path:polygon(12px 0,100% 0,100% 100%,0 100%,0 12px);
}
.logitem .lh{display:flex;justify-content:space-between;flex-wrap:wrap;gap:6px}
.logitem .lw{color:var(--neon);font-weight:700}
.logitem .lt{color:#6fae76;font-size:16.5px}
.logitem details{margin-top:4px}
.logitem summary{cursor:pointer;color:#9adf9f;font-size:16.5px;letter-spacing:.1em}
.logitem .rline{font-size:18px;color:#cdeacd;padding-left:8px}
.logempty{text-align:center;color:#6fae76;padding:40px 0;letter-spacing:.2em}

/* 自製確認視窗(取代 confirm) */
#confirmBox{position:fixed;inset:0;z-index:90;display:none;align-items:center;justify-content:center;background:rgba(1,8,4,.82);backdrop-filter:blur(2px)}
#confirmBox.show{display:flex}
.cwin{
  border:2px solid var(--neon);background:#04170c;padding:22px 24px;max-width:min(88vw,380px);
  clip-path:polygon(16px 0,100% 0,100% calc(100% - 16px),calc(100% - 16px) 100%,0 100%,0 16px);
  box-shadow:0 0 20px rgba(53,232,58,.4);text-align:center;
}
.cwin .cmsg{font-size:21px;line-height:1.8;margin-bottom:18px;color:var(--white)}
.cwin .cbtns{display:flex;gap:12px;justify-content:center}
.cwin .cok{padding:10px 26px;background:var(--neon);color:#031006;font-weight:900;letter-spacing:.2em;text-indent:.2em;
  clip-path:polygon(10px 0,100% 0,calc(100% - 10px) 100%,0 100%)}
.cwin .ccancel{padding:10px 22px;border:1px solid var(--neon-dim);color:#9adf9f;letter-spacing:.2em;text-indent:.2em;
  clip-path:polygon(10px 0,100% 0,calc(100% - 10px) 100%,0 100%)}
#toast{
  position:fixed;left:50%;bottom:24px;transform:translateX(-50%) translateY(80px);
  background:var(--neon);color:#031006;font-weight:700;font-size:19.5px;
  padding:10px 22px;z-index:99;transition:transform .25s;letter-spacing:.05em;
  clip-path:polygon(12px 0,100% 0,calc(100% - 12px) 100%,0 100%);
}
#toast.show{transform:translateX(-50%) translateY(0)}
@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}

/* ====== 全螢幕切換按鈕(首頁右下角浮動) ====== */
#fsBtn{
  position:fixed;right:calc(16px + env(safe-area-inset-right));bottom:calc(16px + env(safe-area-inset-bottom));
  z-index:90;
  display:flex;align-items:center;gap:8px;
  padding:11px 22px;font-size:16.5px;font-weight:700;letter-spacing:.15em;
  color:var(--neon);background:rgba(3,10,5,.9);
  border:2px solid var(--neon);
  clip-path:polygon(12px 0,100% 0,calc(100% - 12px) 100%,0 100%);
  box-shadow:0 0 12px rgba(53,232,58,.5);
  backdrop-filter:blur(2px);transition:transform .08s,background .12s;
}
#fsBtn .fsIco{font-size:21px;line-height:1}
#fsBtn:active{transform:scale(.95);background:var(--neon);color:#031006}
/* 對戰畫面隱藏,避免蓋到中央控制按鈕 */
body[data-screen="battle"] #fsBtn{display:none}
/* 已用「加入主畫面」全螢幕開啟時,不需要這顆按鈕 */
@media (display-mode:standalone),(display-mode:fullscreen){#fsBtn{display:none}}
</style>
</head>
<body>

<!-- ================= 設定 / 註冊 ================= -->
<section class="screen active" id="setup">
  <div class="brand">BEYBLADE<span class="x">X</span><small>BATTLE SCORER</small></div>
  <div id="loadStatus">⟳ 正在從天梯資料庫載入陀螺資料…</div>

  <div class="setup-grid">
    <div class="pcard">
      <h3>PLAYER 1</h3>
      <div class="field">
        <label>選手名稱</label>
        <input id="p1name" maxlength="12" value="陀螺破壞者" placeholder="例如:陀螺破壞者">
      </div>
      <label style="font-size:16.5px;letter-spacing:.2em;color:#9adf9f;display:block;margin-bottom:6px">出戰陀螺 × 3(戰刃 + 固鎖/軸心)</label>
      <div id="p1deck"></div>
      <div class="hint">左欄選戰刃,右欄填配置(例:3-60LR)。資料同步自 Beyblade X Tier 天梯站。</div>
    </div>

    <div class="pcard">
      <h3>PLAYER 2</h3>
      <div class="field">
        <label>選手名稱</label>
        <input id="p2name" maxlength="12" value="安息滅霸王" placeholder="例如:安息滅霸王">
      </div>
      <label style="font-size:16.5px;letter-spacing:.2em;color:#9adf9f;display:block;margin-bottom:6px">出戰陀螺 × 3(戰刃 + 固鎖/軸心)</label>
      <div id="p2deck"></div>
      <div class="hint">對戰中可隨時切換出戰的陀螺。</div>
    </div>
  </div>

  <div class="format-row">
    <button class="fmt sel" data-pt="4">4 分制(標準)</button>
    <button class="fmt" data-pt="7">7 分制</button>
  </div>

  <button class="bigbtn" id="startBtn">進入對戰</button>

  <div class="subbtns">
    <button class="ghostbtn" id="gotoLog">📄 對戰紀錄</button>
    <button class="ghostbtn" id="importBtn">⬆ 匯入 TXT 資料庫</button>
    <input type="file" id="importFile" accept=".txt" hidden>
  </div>
</section>

<!-- ================= 對戰(仿官方平板面板) ================= -->
<section class="screen" id="battle">
  <div class="corner tl"></div><div class="corner tr"></div>
  <div class="corner bl"></div><div class="corner br"></div>
  <div class="hud">
    <div class="toprow">
      <div class="nameplate p1" id="bp1name">P1</div>
      <div class="roundbox">
        <div class="r">R<b id="roundNum">1</b></div>
        <div class="timer" id="timer">00:00</div>
        <div class="target-note" id="targetNote">先取 4 分</div>
      </div>
      <div class="nameplate p2" id="bp2name">P2</div>
    </div>

    <div class="mainrow">
      <!-- 左側決勝按鈕 -->
      <div class="fincol left">
        <button class="readybtn" id="ready1">TAP TO<br>READY</button>
        <button class="fbtn" data-p="1" data-f="迴轉勝" data-pt="1"><span><span class="fname">SPIN</span><br><span class="fsub">Finish・迴轉勝</span></span><span class="fpts">+1</span></button>
        <button class="fbtn" data-p="1" data-f="場外勝" data-pt="2"><span><span class="fname">OVER</span><br><span class="fsub">Finish・場外勝</span></span><span class="fpts">+2</span></button>
        <button class="fbtn" data-p="1" data-f="爆烈勝" data-pt="2"><span><span class="fname">BURST</span><br><span class="fsub">Finish・爆烈勝</span></span><span class="fpts">+2</span></button>
        <button class="fbtn xtreme" data-p="1" data-f="極限勝" data-pt="3"><span><span class="fname">XTREME</span><br><span class="fsub">Finish・極限勝</span></span><span class="fpts">+3</span></button>
      </div>

      <!-- 中央分數 + 控制 -->
      <div class="centercol">
        <div class="scorepair">
          <div class="scoreunit">
            <div class="scorebox" id="sb1">
              <div class="digit zero" id="score1">0</div>
            </div>
            <div class="scorelabel">SCORE</div>
          </div>
          <div class="midtris"><span class="l"></span><span class="r"></span></div>
          <div class="scoreunit">
            <div class="scorebox" id="sb2">
              <div class="digit zero" id="score2">0</div>
            </div>
            <div class="scorelabel">SCORE</div>
          </div>
        </div>

        <button class="midbtn" id="drawBtn">平 手</button>

        <div class="failrow">
          <div class="failunit">
            <div class="flab">發射失敗</div>
            <div class="faildots" id="fail1"><i></i><i></i></div>
          </div>
          <div class="failunit">
            <div class="flab">發射失敗</div>
            <div class="faildots" id="fail2"><i></i><i></i></div>
          </div>
        </div>

        <div class="smallbtns">
          <button class="ctrl" id="undoBtn">復原</button>
          <button class="ctrl" id="backBtn">離開</button>
        </div>
      </div>

      <!-- 右側決勝按鈕 -->
      <div class="fincol right">
        <button class="readybtn" id="ready2">TAP TO<br>READY</button>
        <button class="fbtn" data-p="2" data-f="迴轉勝" data-pt="1"><span><span class="fname">SPIN</span><br><span class="fsub">迴轉勝・Finish</span></span><span class="fpts">+1</span></button>
        <button class="fbtn" data-p="2" data-f="場外勝" data-pt="2"><span><span class="fname">OVER</span><br><span class="fsub">場外勝・Finish</span></span><span class="fpts">+2</span></button>
        <button class="fbtn" data-p="2" data-f="爆烈勝" data-pt="2"><span><span class="fname">BURST</span><br><span class="fsub">爆烈勝・Finish</span></span><span class="fpts">+2</span></button>
        <button class="fbtn xtreme" data-p="2" data-f="極限勝" data-pt="3"><span><span class="fname">XTREME</span><br><span class="fsub">極限勝・Finish</span></span><span class="fpts">+3</span></button>
      </div>
    </div>

    <div class="botrow">
      <div class="beyslot" id="slot1">
        <div class="beycard" id="beycard1"></div>
        <div class="deckdots" id="dots1"></div>
      </div>
      <div class="beyslot right" id="slot2">
        <div class="beycard" id="beycard2"></div>
        <div class="deckdots" id="dots2"></div>
      </div>
    </div>
  </div>
</section>

<!-- ================= 倒數 ================= -->
<div id="countdown">
  <div id="cdWrap" class="p-up">
    <span class="cdTri" id="cdTri"></span>
    <div id="cdText">3</div>
  </div>
</div>

<!-- ================= 勝利 ================= -->
<div id="victory">
  <div class="vbox">
    <div class="vt">▶ WINNER ◀</div>
    <div class="vn neon-text" id="winName">—</div>
    <div class="vsics" id="winScore">0 - 0</div>
    <button class="bigbtn" id="rematchBtn">再戰一場</button>
    <div class="subbtns">
      <button class="ghostbtn" id="vLogBtn">📄 查看紀錄</button>
      <button class="ghostbtn" id="vHomeBtn">🏠 回到設定</button>
    </div>
  </div>
</div>

<!-- ================= 紀錄 ================= -->
<section class="screen" id="log">
  <div class="brand">BATTLE<span class="x">LOG</span><small>對戰紀錄資料庫</small></div>
  <div class="subbtns" style="margin-bottom:16px">
    <button class="ghostbtn" id="exportBtn">⬇ 匯出 TXT 資料庫</button>
    <button class="ghostbtn" id="clearLogBtn">🗑 清空紀錄</button>
    <button class="ghostbtn" id="logHomeBtn">🏠 回到設定</button>
  </div>
  <div id="logList"></div>
</section>

<div id="confirmBox">
  <div class="cwin">
    <div class="cmsg" id="cMsg">確定?</div>
    <div class="cbtns">
      <button class="cok" id="cOk">確定</button>
      <button class="ccancel" id="cCancel">取消</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<button id="fsBtn" type="button" aria-label="切換全螢幕"><span class="fsIco">⛶</span><span class="fsTxt">全螢幕</span></button>

let AC = null;
function ac(){ if(!AC) AC = new (window.AudioContext||window.webkitAudioContext)(); if(AC.state==="suspended")AC.resume(); return AC; }

/* --- 官方風語音:base64 → ArrayBuffer → Web Audio 解碼 ---
   不走 <audio> 元素,避免被沙箱 / CSP 擋掉 --- */
let voiceBuf = null, voiceState = "idle"; // idle | loading | ok | fail
function initVoice(){
  if(voiceState!=="idle") return;
  voiceState = "loading";
  try{
    const bin = atob(GOSHOOT_B64);
    const bytes = new Uint8Array(bin.length);
    for(let i=0;i<bin.length;i++) bytes[i]=bin.charCodeAt(i);
    ac().decodeAudioData(bytes.buffer,
      buf=>{voiceBuf=buf;voiceState="ok"},
      ()=>{voiceState="fail"});
  }catch(e){ voiceState="fail"; }
}
function playVoice(){
  if(voiceState==="ok" && voiceBuf){
    try{
      const a=ac(),src=a.createBufferSource(),g=a.createGain();
      g.gain.value=1;src.buffer=voiceBuf;
      src.connect(g);g.connect(a.destination);src.start();
      return true;
    }catch(e){}
  }
  return false;
}
/* 語音不可用時的倒數嗶聲(對齊 3/2/1/Go/Shoot) */
function beepCountdown(){
  tone(740,.22,"square",.22,0);      // 3
  tone(740,.22,"square",.22,1.2);    // 2
  tone(740,.22,"square",.22,2.45);   // 1
  tone(1180,.4,"square",.26,3.0);    // Go!
  tone(1568,.55,"square",.24,4.8);   // Shoot!
  tone(2093,.35,"square",.18,5.0);
}
function tone(freq,dur,type="square",vol=.18,when=0){
  const a=ac(),o=a.createOscillator(),g=a.createGain();
  o.type=type;o.frequency.value=freq;
  g.gain.setValueAtTime(vol,a.currentTime+when);
  g.gain.exponentialRampToValueAtTime(.0001,a.currentTime+when+dur);
  o.connect(g);g.connect(a.destination);
  o.start(a.currentTime+when);o.stop(a.currentTime+when+dur+.05);
}

function parseCSV(str){
  const arr=[];let quote=false,col,c;
  for(let row=col=c=0;c<str.length;c++){
    const cc=str[c],nc=str[c+1];
    arr[row]=arr[row]||[];arr[row][col]=arr[row][col]||'';
    if(cc=='"'&&quote&&nc=='"'){arr[row][col]+=cc;++c;continue}
    if(cc=='"'){quote=!quote;continue}
    if(cc==','&&!quote){++col;continue}
    if(cc=='\r'&&nc=='\n'&&!quote){++row;col=0;++c;continue}
    if(cc=='\n'&&!quote){++row;col=0;continue}
    if(cc=='\r'&&!quote){++row;col=0;continue}
    arr[row][col]+=cc;
  }
  return arr;
}
async function loadBlades(){
  const st=document.getElementById('loadStatus');
  try{
    const res=await fetch(SHEET_URL+"&_="+Date.now());
    const rows=parseCSV(await res.text());
    const blades=[],rset=new Set(),bset=new Set();
    for(let i=1;i<rows.length;i++){
      const r=rows[i];if(!r||!r[0])continue;
      const cat=(r[2]||"blade").trim();
      const obj={id:r[0].trim(),name:(r[1]||"").trim(),type:(r[3]||"attack").trim(),tier:(r[4]||"-").trim()};
      if(cat==="blade"){
        blades.push(obj);
        const imgUrl=r[12]?r[12].trim():"";
        if(imgUrl){
          /* 與天梯站相同:重複代號時改用 代號_名稱 當 key */
          if(IMG[obj.id]){
            const dup=blades.find(x=>x.id===obj.id&&x.name!==obj.name);
            if(dup)IMG[obj.id+"_"+dup.name]=IMG[obj.id];
            IMG[obj.id+"_"+obj.name]=imgUrl;
          }else{
            IMG[obj.id]=imgUrl;
          }
          IMG["name:"+obj.name]=imgUrl;   /* 依名稱直接查表 */
        }
        if(r[6])r[6].split(/[,、/]/).forEach(x=>{x=x.trim();if(x)rset.add(x)});
        if(r[8])r[8].split(/[,、/]/).forEach(x=>{x=x.trim();if(x)bset.add(x)});
      }
    }
    if(!blades.length)throw new Error("empty");
    const order=["X","S+","S","A+","A","B+","B","C+","C","D+","D","E+","E","-"];
    blades.sort((a,b)=>order.indexOf(a.tier)-order.indexOf(b.tier)||a.name.localeCompare(b.name,'zh-Hant'));
    BLADES=blades;RATCHETS=[...rset].sort();BITS=[...bset].sort();
    st.textContent=`✔ 已載入 ${blades.length} 顆戰刃(同步自天梯資料庫)`;
  }catch(e){
    BLADES=FALLBACK_BLADES;
    st.textContent="⚠ 無法連線天梯資料庫,已改用內建清單";
    st.classList.add('err');
  }
  buildDeckSelectors();
}

  for(const b of BLADES){
    const s=(sel===b.name)?' selected':'';
    html+=`<option value="${b.name}"${s}>[${b.tier}] ${b.name}(${TYPE_LABELS[b.type]||b.type})</option>`;
  }
  return html;
}
function buildDeckSelectors(){
  const dl=`<datalist id="cfglist">${RATCHETS.flatMap(r=>BITS.map(b=>`<option value="${r}${b}">`)).slice(0,300).join("")}</datalist>`;
  for(const p of [1,2]){
    const box=document.getElementById('p'+p+'deck');
    let html="";
    for(let i=0;i<3;i++){
      const prev=SETUPMEM?SETUPMEM['p'+p].deck[i]:null;
      html+=`<div class="deck-slot">
        <select id="p${p}b${i}">${bladeOptions(prev?prev.blade:"")}</select>
        <input id="p${p}c${i}" list="cfglist" placeholder="配置" maxlength="14" value="${prev?prev.cfg:""}">
      </div>`;
    }
    box.innerHTML=html;
  }
  if(!document.getElementById('cfglist'))document.body.insertAdjacentHTML('beforeend',dl);
  if(SETUPMEM){
    document.getElementById('p1name').value=SETUPMEM.p1.name;
    document.getElementById('p2name').value=SETUPMEM.p2.name;
  }
}
document.querySelectorAll('.fmt').forEach(b=>b.addEventListener('click',()=>{
  document.querySelectorAll('.fmt').forEach(x=>x.classList.remove('sel'));
  b.classList.add('sel');targetPts=+b.dataset.pt;sfx.tap();
}));
function readSetup(){
  const get=id=>document.getElementById(id).value.trim();
  const players={};
  for(const p of [1,2]){
    const deck=[];
    for(let i=0;i<3;i++){
      const blade=get(`p${p}b${i}`),cfg=get(`p${p}c${i}`);
      if(blade)deck.push({blade,cfg});
    }
    players['p'+p]={name:get('p'+p+'name')||('PLAYER '+p),deck};
  }
  return players;
}

/* ============================================================
   對戰狀態 + READY / 倒數流程
============================================================ */
let M=null;
let roundLive=false;      // GO 之後、決勝前
let readyState=[false,false];
let timerH=null, timerSec=0;

function newMatch(){
  const s=readSetup();
  if(!s.p1.deck.length||!s.p2.deck.length){toast("每位選手至少要登錄 1 顆陀螺");return}
  SETUPMEM=s;store.set('beyx:setup',s);
  M={
    p1:{...s.p1,score:0,active:0,fails:0},
    p2:{...s.p2,score:0,active:0,fails:0},
    round:1,target:targetPts,history:[],rounds:[]
  };
  sfx.tap();
  preloadDeckImages();
  armReady();
  renderBattle();
  showScreen('battle');
}
function beyLabel(b){return b?b.blade+(b.cfg?b.cfg:""):"—"}
function fmtTime(s){return String(Math.floor(s/60)).padStart(2,'0')+":"+String(s%60).padStart(2,'0')}
function stopTimer(){clearInterval(timerH);timerH=null}
function startTimer(){
  stopTimer();
  timerH=setInterval(()=>{timerSec++;document.getElementById('timer').textContent=fmtTime(timerSec)},1000);
}

/* 回合開始前:進入 READY 狀態 */
function armReady(){
  roundLive=false;
  readyState=[false,false];
  for(const i of [1,2]){
    const rb=document.getElementById('ready'+i);
    rb.hidden=false;
    rb.classList.remove('ready');
    rb.innerHTML='TAP TO<br>READY';
  }
  setBtnsEnabled(false);
}
function setBtnsEnabled(on){
  document.querySelectorAll('.fbtn').forEach(b=>b.toggleAttribute('disabled',!on));
  document.getElementById('drawBtn').toggleAttribute('disabled',!on);
}
document.getElementById('ready1').addEventListener('click',()=>tapReady(0));
document.getElementById('ready2').addEventListener('click',()=>tapReady(1));
function tapReady(i){
  if(roundLive||!M||readyState[i])return;
  readyState[i]=true;
  sfx.ready();
  const rb=document.getElementById('ready'+(i+1));
  rb.classList.add('ready');
  rb.innerHTML="READY!";
  if(readyState[0]&&readyState[1])startCountdown();
}

/* 全白倒數 3・2・1・GO・SHOOT!(逐字對齊語音,配螢光綠三角形) */
function startCountdown(){
  const ov=document.getElementById('countdown'),tx=document.getElementById('cdText');
  const wrap=document.getElementById('cdWrap'),tri=document.getElementById('cdTri');
  ov.classList.add('show');
  tx.classList.remove('goshoot');
  /* pos: up=三角在上, left=三角在左, down=三角在下, right=三角在右, none=不顯示 */
  const cue=(txt,pos,big)=>{
    tx.textContent=txt;
    tx.classList.toggle('goshoot',!!big);
    wrap.className = pos ? ('p-'+pos) : '';
    tri.style.display = pos ? 'block' : 'none';
    tx.style.animation='none';void tx.offsetWidth;tx.style.animation='';
    tri.style.animation='none';void tri.offsetWidth;tri.style.animation='';
  };
  cue("3","up");
  /* 語音實測時間點:3≈0s、2≈1.2s、1≈2.45s、Go≈3.0s、Shoot≈4.8s、結束≈5.6s */
  if(!playVoice()) beepCountdown();
  setTimeout(()=>cue("2","left"),1200);
  setTimeout(()=>cue("1","down"),2450);
  setTimeout(()=>cue("GO","right",true),3000);
  setTimeout(()=>cue("SHOOT!",null,true),4800);
  setTimeout(()=>{
    ov.classList.remove('show');
    roundLive=true;
    document.getElementById('ready1').hidden=true;
    document.getElementById('ready2').hidden=true;
    setBtnsEnabled(true);
    startTimer();
  },5700);
}

function renderBattle(){
  document.getElementById('bp1name').textContent=M.p1.name;
  document.getElementById('bp2name').textContent=M.p2.name;
  document.getElementById('roundNum').textContent=M.round;
  document.getElementById('targetNote').textContent=`先取 ${M.target} 分`;
  document.getElementById('timer').textContent=fmtTime(timerSec);
  for(const p of [1,2]){
    const P=M['p'+p];
    const d=document.getElementById('score'+p);
    d.textContent=P.score;
    d.classList.toggle('zero',P.score===0);
    /* 發射失敗點 */
    const dots=document.querySelectorAll('#fail'+p+' i');
    dots.forEach((el,i)=>el.classList.toggle('on',i<P.fails));
    const bey=P.deck[P.active];
    const bl=BLADES.find(b=>b.name===bey.blade);
    const url=bladeImgUrl(bl);
    const img=(url&&IMG_OK[url]!==false)
      ? `<img src="${url}" alt="${bey.blade}">`
      : beySVG(bl?bl.type:"attack");
    document.getElementById('beycard'+p).innerHTML=
      img+`<div><div class="bn">${beyLabel(bey)}</div><div class="bt">${bl?("["+bl.tier+"] "+(TYPE_LABELS[bl.type]||"")):""}</div></div>`;
    const cardImg=document.querySelector('#beycard'+p+' img');
    if(cardImg)cardImg.addEventListener('error',()=>{IMG_OK[cardImg.src]=false;renderBattle()},{once:true});
    const dd=document.getElementById('dots'+p);
    dd.innerHTML=P.deck.map((b,i)=>{
      const b2=BLADES.find(x=>x.name===b.blade);
      const u2=bladeImgUrl(b2);
      const th=(u2&&IMG_OK[u2]!==false)
        ? `<img class="thumb" src="${u2}" alt="">`
        : `<span class="thumb dot" style="background:${TYPE_COLORS[b2?b2.type:'attack']||'#35e83a'}"></span>`;
      return `<button class="${i===P.active?'on':''}" data-p="${p}" data-i="${i}">${th}<span>${b.blade}</span></button>`;
    }).join("");
  }
}
document.addEventListener('click',e=>{
  const t=e.target.closest('.deckdots button');
  if(t&&M){M['p'+t.dataset.p].active=+t.dataset.i;sfx.tap();renderBattle()}
});

function snapshot(){
  M.history.push(JSON.stringify({p1s:M.p1.score,p2s:M.p2.score,f1:M.p1.fails,f2:M.p2.fails,round:M.round,rounds:M.rounds.length}));
}
function pushRound(winnerP,fin,pts){
  M.rounds.push({
    r:M.round,winner:winnerP?M['p'+winnerP].name:"—",finish:fin,pts,
    bey1:beyLabel(M.p1.deck[M.p1.active]),bey2:beyLabel(M.p2.deck[M.p2.active])
  });
}

/* 決勝按鈕 */
document.querySelectorAll('.fbtn').forEach(b=>b.addEventListener('click',()=>{
  if(!M||!roundLive)return;
  const p=+b.dataset.p,pts=+b.dataset.pt,fin=b.dataset.f;
  snapshot();
  M['p'+p].score+=pts;
  pushRound(p,fin,pts);
  stopTimer();
  sfx.score(pts);
  const sb=document.getElementById('sb'+p);
  sb.classList.add('bump');setTimeout(()=>sb.classList.remove('bump'),150);
  if(M['p'+p].score>=M.target){finishMatch(p);return}
  M.round++;armReady();renderBattle();
}));

/* 平手 */
document.getElementById('drawBtn').addEventListener('click',()=>{
  if(!M||!roundLive)return;
  snapshot();
  pushRound(0,"平手",0);
  stopTimer();sfx.draw();
  M.round++;armReady();renderBattle();
});

/* 發射失敗:點一下 +1,累積 2 次 → 對手 +1 分 */
for(const p of [1,2]){
  document.getElementById('fail'+p).addEventListener('click',()=>{
    if(!M)return;
    snapshot();
    const P=M['p'+p],opp=p===1?2:1;
    P.fails++;
    sfx.fail();
    if(P.fails>=2){
      P.fails=0;
      M['p'+opp].score+=1;
      pushRound(opp,"對手發射失敗×2",1);
      if(M['p'+opp].score>=M.target){renderBattle();finishMatch(opp);return}
      M.round++;armReady();
    }
    renderBattle();
  });
}

document.getElementById('undoBtn').addEventListener('click',()=>{
  if(!M)return;
  if(!M.history.length){sfx.tap();toast("沒有可復原的動作");return}
  const h=JSON.parse(M.history.pop());
  M.p1.score=h.p1s;M.p2.score=h.p2s;
  M.p1.fails=h.f1;M.p2.fails=h.f2;
  M.round=h.round;M.rounds.length=h.rounds;
  stopTimer();armReady();renderBattle();sfx.tap();
  toast("已復原上一步");
});
document.getElementById('backBtn').addEventListener('click',async()=>{
  sfx.tap();
  if(await askConfirm("離開對戰?目前比分將不會存入紀錄。","離開")){stopTimer();showScreen('setup')}
});

/* 勝利 */
async function finishMatch(p){
  renderBattle();
  sfx.win();
  const rec={
    time:new Date().toISOString().slice(0,16).replace('T',' '),
    p1:M.p1.name,p2:M.p2.name,s1:M.p1.score,s2:M.p2.score,
    winner:M['p'+p].name,target:M.target,
    deck1:M.p1.deck.map(beyLabel).join(" / "),
    deck2:M.p2.deck.map(beyLabel).join(" / "),
    rounds:M.rounds
  };
  LOG.unshift(rec);
  await store.set('beyx:log',LOG);
  document.getElementById('winName').textContent=rec.winner;
  document.getElementById('winScore').textContent=rec.s1+" - "+rec.s2;
  document.getElementById('victory').classList.add('show');
}
document.getElementById('rematchBtn').addEventListener('click',()=>{
  document.getElementById('victory').classList.remove('show');
  M.p1.score=0;M.p2.score=0;M.p1.fails=0;M.p2.fails=0;
  M.round=1;M.rounds=[];M.history=[];timerSec=0;
  armReady();renderBattle();showScreen('battle');
});
document.getElementById('vLogBtn').addEventListener('click',()=>{
  document.getElementById('victory').classList.remove('show');renderLog();showScreen('log');
});
document.getElementById('vHomeBtn').addEventListener('click',()=>{
  document.getElementById('victory').classList.remove('show');showScreen('setup');
});

/* ============================================================
   紀錄畫面 + TXT 資料庫
============================================================ */
function renderLog(){
  const box=document.getElementById('logList');
  if(!LOG.length){box.innerHTML='<div class="logempty">尚無對戰紀錄</div>';return}
  box.innerHTML=LOG.map(r=>`
    <div class="logitem">
      <div class="lh">
        <span>${r.p1} <b class="neon-text">${r.s1}</b> : <b class="neon-text">${r.s2}</b> ${r.p2}</span>
        <span class="lw">🏆 ${r.winner}</span>
        <span class="lt">${r.time}(${r.target}分制)</span>
      </div>
      <details>
        <summary>回合明細 / 陣容</summary>
        <div class="rline">陣容 ${r.p1}:${r.deck1}</div>
        <div class="rline">陣容 ${r.p2}:${r.deck2}</div>
        ${r.rounds.map(x=>`<div class="rline">R${x.r} — ${x.winner} ${x.finish}(+${x.pts})|${x.bey1} vs ${x.bey2}</div>`).join("")}
      </details>
    </div>`).join("");
}
function toTXT(){
  const L=[];
  L.push("=== BEYBLADE X 對戰紀錄資料庫 ===");
  L.push("# 匯出時間: "+new Date().toLocaleString('zh-TW'));
  L.push("# 格式: REC|時間|選手1|選手2|分數1|分數2|勝者|目標分|陣容1|陣容2");
  L.push("#       RND|回合|得分者|決勝方式|得分|出戰1|出戰2");
  L.push("");
  for(const r of LOG){
    L.push(["REC",r.time,r.p1,r.p2,r.s1,r.s2,r.winner,r.target,r.deck1,r.deck2].join("|"));
    for(const x of r.rounds)L.push(["RND",x.r,x.winner,x.finish,x.pts,x.bey1,x.bey2].join("|"));
    L.push("");
  }
  return L.join("\n");
}
function fromTXT(txt){
  const out=[];let cur=null;
  for(const line of txt.split(/\r?\n/)){
    const c=line.split("|");
    if(c[0]==="REC"){
      cur={time:c[1],p1:c[2],p2:c[3],s1:+c[4],s2:+c[5],winner:c[6],target:+c[7]||4,deck1:c[8]||"",deck2:c[9]||"",rounds:[]};
      out.push(cur);
    }else if(c[0]==="RND"&&cur){
      cur.rounds.push({r:+c[1],winner:c[2],finish:c[3],pts:+c[4],bey1:c[5]||"",bey2:c[6]||""});
    }
  }
  return out;
}
document.getElementById('exportBtn').addEventListener('click',()=>{
  if(!LOG.length){toast("目前沒有紀錄可匯出");return}
  const blob=new Blob([toTXT()],{type:"text/plain;charset=utf-8"});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download="beyblade_x_battle_db.txt";
  a.click();URL.revokeObjectURL(a.href);
  toast("已匯出 TXT 資料庫");
});
document.getElementById('importBtn').addEventListener('click',()=>document.getElementById('importFile').click());
document.getElementById('importFile').addEventListener('change',async e=>{
  const f=e.target.files[0];if(!f)return;
  const txt=await f.text();
  const recs=fromTXT(txt);
  if(!recs.length){toast("TXT 內找不到有效紀錄");return}
  LOG=recs.concat(LOG);
  await store.set('beyx:log',LOG);
  toast(`已匯入 ${recs.length} 筆紀錄`);
  e.target.value="";
});
document.getElementById('clearLogBtn').addEventListener('click',async()=>{
  if(!LOG.length)return;
  if(await askConfirm("確定清空所有對戰紀錄?建議先匯出 TXT 備份。","清空")){
    LOG=[];await store.set('beyx:log',LOG);renderLog();toast("紀錄已清空");
  }
});

/* ============================================================
   導覽 & 初始化
============================================================ */
function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  document.body.dataset.screen=id;
  window.scrollTo(0,0);
}
/* 自製確認視窗(Promise 版,取代被沙箱擋掉的 window.confirm) */
function askConfirm(msg,okText="確定"){
  return new Promise(resolve=>{
    const box=document.getElementById('confirmBox');
    document.getElementById('cMsg').textContent=msg;
    document.getElementById('cOk').textContent=okText;
    box.classList.add('show');
    const done=v=>{
      box.classList.remove('show');
      document.getElementById('cOk').onclick=null;
      document.getElementById('cCancel').onclick=null;
      box.onclick=null;
      resolve(v);
    };
    document.getElementById('cOk').onclick=()=>done(true);
    document.getElementById('cCancel').onclick=()=>done(false);
    box.onclick=e=>{if(e.target===box)done(false)};
  });
}
function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  clearTimeout(t._h);t._h=setTimeout(()=>t.classList.remove('show'),2200);
}
/* ====== 全螢幕切換 ====== */
(function(){
  const btn=document.getElementById('fsBtn');
  const txt=btn.querySelector('.fsTxt'), ico=btn.querySelector('.fsIco');
  const fsEl=()=>document.fullscreenElement||document.webkitFullscreenElement;
  function enter(){
    const el=document.documentElement;
    (el.requestFullscreen||el.webkitRequestFullscreen||el.webkitRequestFullScreen||(()=>{})).call(el);
  }
  function exit(){
    (document.exitFullscreen||document.webkitExitFullscreen||(()=>{})).call(document);
  }
  btn.addEventListener('click',()=>{fsEl()?exit():enter()});
  function sync(){
    const on=!!fsEl();
    txt.textContent=on?'結束全螢幕':'全螢幕';
    ico.textContent=on?'✕':'⛶';
  }
  document.addEventListener('fullscreenchange',sync);
  document.addEventListener('webkitfullscreenchange',sync);
  sync();
})();

document.getElementById('startBtn').addEventListener('click',newMatch);
document.getElementById('gotoLog').addEventListener('click',()=>{renderLog();showScreen('log')});
document.getElementById('logHomeBtn').addEventListener('click',()=>showScreen('setup'));

(async function init(){
  SETUPMEM=await store.get('beyx:setup');
  LOG=(await store.get('beyx:log'))||[];
  await loadBlades();
})();
</script>
